# See Documentation for more information:
# https://docs.powersync.com/sync/streams/overview
#
# Note that changes to this file are not watched.
# The service needs to be restarted for changes to take effect.

config:
  edition: 3

streams:
  # Web stream: Zero Trust — nothing syncs unless a role check passes.
  # Web clients connect with params: { app: "web" }.
  web:
    auto_subscribe: true
    accept_potentially_dangerous_queries: true
    queries:
      # Identity tables: needed by useUserAccess to determine role.
      - SELECT * FROM "Users" WHERE connection.parameter('app') = 'web' AND clerk_user_id = auth.user_id()
      - SELECT * FROM "AccountManagers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Developers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "UserStatuses" WHERE connection.parameter('app') = 'web'

      # Dashboard filter settings: each user sees only their own row
      - SELECT "DashboardFilterSettings".* FROM "DashboardFilterSettings" JOIN "Users" ON "DashboardFilterSettings"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()

      # Viewer tables: is_viewer gets read-only access (write blocked by RLS)
      - SELECT "Addresses".* FROM "Addresses" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "BleacherEvents".* FROM "BleacherEvents" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "BleacherMaintEvents".* FROM "BleacherMaintEvents" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "Bleachers".* FROM "Bleachers" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "Blocks".* FROM "Blocks" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "DamageReports".* FROM "DamageReports" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "Drivers".* FROM "Drivers" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "DriverScoreCardStats".* FROM "DriverScoreCardStats" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "DriverScorecardStatsPerDriver".* FROM "DriverScorecardStatsPerDriver" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "DriverUnavailability".* FROM "DriverUnavailability" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "Events".* FROM "Events" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "HomeBases".* FROM "HomeBases" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "MaintenanceEvents".* FROM "MaintenanceEvents" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "ScorecardTargets".* FROM "ScorecardTargets" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "WorkTrackerGroups".* FROM "WorkTrackerGroups" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "WorkTrackerInspections".* FROM "WorkTrackerInspections" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "WorkTrackers".* FROM "WorkTrackers" JOIN "Users" ON "Users"."is_viewer" = true WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()

      # Alert tables: user sees only their own alerts via UserAlerts.user_uuid
      - SELECT "Alerts".* FROM "Alerts" JOIN "UserAlerts" ON "UserAlerts"."alert_uuid" = "Alerts"."id" JOIN "Users" ON "UserAlerts"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "UserAlerts".* FROM "UserAlerts" JOIN "Users" ON "UserAlerts"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()

      # Developer tables: developer role
      - SELECT "RoadmapQuarters".* FROM "RoadmapQuarters" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapSprints".* FROM "RoadmapSprints" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapFeatures".* FROM "RoadmapFeatures" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapFeatureSprintLabels".* FROM "RoadmapFeatureSprintLabels" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapTasks".* FROM "RoadmapTasks" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapBacklogTickets".* FROM "RoadmapBacklogTickets" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapTaskSubscriptions".* FROM "RoadmapTaskSubscriptions" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapTaskMessages".* FROM "RoadmapTaskMessages" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapTaskMessageReadReceipts".* FROM "RoadmapTaskMessageReadReceipts" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapTaskTypingIndicators".* FROM "RoadmapTaskTypingIndicators" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()
      - SELECT "RoadmapAttachments".* FROM "RoadmapAttachments" JOIN "Developers" ON "Developers"."is_active" = true JOIN "Users" ON "Developers"."user_uuid" = "Users"."id" WHERE connection.parameter('app') = 'web' AND "Users"."clerk_user_id" = auth.user_id()

      # Manager tables: account manager role
