  # Mobile stream: auto-subscribes on connect, gated by connection parameter.
  # Mobile clients connect with params: { app: "mobile" }.
  # Driver-scoped subset to keep devices small.
  #
  # Some of these tables are Postgres views that pre-join/shape data,
  # created in Supabase migrations (see br_next/bleacher_rentals/supabase/migrations).
  mobile:
    auto_subscribe: true
    accept_potentially_dangerous_queries: true
    queries:
      - SELECT * FROM "AccountManagers" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Addresses" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "BleacherEvents" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "BleacherUsers" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Bleachers" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Blocks" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "BlueBook" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "DamageReportPhotos" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "DamageReports" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "DriverUnavailability" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Drivers" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Events" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "HomeBases" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "InspectionPhotos" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "InspectionQuestions" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "TaskStatuses" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "TaskTypes" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Tasks" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "UserHomeBases" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "UserRoles" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "UserStatuses" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Users" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "Vehicles" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "WorkTrackerInspections" WHERE connection.parameter('app') = 'mobile'
      - SELECT * FROM "WorkTrackers" WHERE connection.parameter('app') = 'mobile'
