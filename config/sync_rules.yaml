# See Documentation for more information:
# https://docs.powersync.com/sync/streams/overview
#
# Note that changes to this file are not watched.
# The service needs to be restarted for changes to take effect.

config:
  edition: 3

streams:
  # Web stream: auto-subscribes on connect, gated by connection parameter.
  # Web clients connect with params: { app: "web" }.
  web:
    auto_subscribe: true
    accept_potentially_dangerous_queries: true
    queries:
      - SELECT * FROM "AccountManagers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Addresses" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Alerts" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "BleacherEvents" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "BleacherMaintEvents" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "BleacherUsers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Bleachers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Blocks" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "BlueBook" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "DashboardFilterSettings" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Developers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "DriverScoreCardStats" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "DriverScorecardStatsPerDriver" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "DriverUnavailability" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Drivers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Events" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "HomeBases" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "InspectionQuestions" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "MaintenanceEvents" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapAttachments" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapBacklogTickets" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapFeatureSprintLabels" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapFeatures" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapQuarters" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapSprints" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapTaskMessageReadReceipts" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapTaskMessages" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapTaskSubscriptions" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapTaskTypingIndicators" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "RoadmapTasks" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "ScorecardTargets" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "TaskStatuses" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "TaskTypes" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Tasks" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "UserAlerts" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "UserHomeBases" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "UserRoles" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "UserStatuses" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Users" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "Vendors" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "WorkTrackerGroups" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "WorkTrackerInspections" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "WorkTrackers" WHERE connection.parameter('app') = 'web'
      - SELECT * FROM "ZoneStateProvinces" WHERE connection.parameter('app') = 'web'
