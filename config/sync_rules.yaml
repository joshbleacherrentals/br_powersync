# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json
#
# See Documentation for more information:
# https://docs.powersync.com/usage/sync-rules
#
# Note that changes to this file are not watched.
# The service needs to be restarted for changes to take effect.

bucket_definitions:
  web:
    parameters: |
      select 'web' as app
      where (request.parameters() ->> 'app') = 'web'
    data:
      - SELECT * FROM "AccountManagers" WHERE bucket.app = 'web'
      - SELECT * FROM "Addresses" WHERE bucket.app = 'web'
      - SELECT * FROM "BleacherEvents" WHERE bucket.app = 'web'
      - SELECT * FROM "BleacherUsers" WHERE bucket.app = 'web'
      - SELECT * FROM "Bleachers" WHERE bucket.app = 'web'
      - SELECT * FROM "Blocks" WHERE bucket.app = 'web'
      - SELECT * FROM "Drivers" WHERE bucket.app = 'web'
      - SELECT * FROM "Events" WHERE bucket.app = 'web'
      - SELECT * FROM "HomeBases" WHERE bucket.app = 'web'
      - SELECT * FROM "TaskStatuses" WHERE bucket.app = 'web'
      - SELECT * FROM "TaskTypes" WHERE bucket.app = 'web'
      - SELECT * FROM "Tasks" WHERE bucket.app = 'web'
      - SELECT * FROM "UserHomeBases" WHERE bucket.app = 'web'
      - SELECT * FROM "UserRoles" WHERE bucket.app = 'web'
      - SELECT * FROM "UserStatuses" WHERE bucket.app = 'web'
      - SELECT * FROM "Users" WHERE bucket.app = 'web'
      - SELECT * FROM "WorkTrackers" WHERE bucket.app = 'web'
      - SELECT * FROM "DashboardFilterSettings" WHERE bucket.app = 'web'
      - SELECT * FROM "BlueBook" WHERE bucket.app = 'web'

  # Mobile sync is driver-scoped to keep devices small.
  # PowerSync restricts sync-rule data queries to a small safe subset
  # (single-table SELECTs, no joins/unions/subqueries).
  #
  # We satisfy this by querying through Postgres views that pre-join/shape the data.
  # These views are created in Supabase migrations (see br_next/bleacher_rentals/supabase/migrations).
  mobile:
    parameters: |
      select 'mobile' as app
      where (request.parameters() ->> 'app') = 'mobile'

    data:
      - SELECT * FROM "AccountManagers" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Addresses" WHERE bucket.app = 'mobile'
      - SELECT * FROM "BleacherEvents" WHERE bucket.app = 'mobile'
      - SELECT * FROM "BleacherUsers" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Bleachers" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Blocks" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Drivers" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Events" WHERE bucket.app = 'mobile'
      - SELECT * FROM "HomeBases" WHERE bucket.app = 'mobile'
      - SELECT * FROM "InspectionPhotos" WHERE bucket.app = 'mobile'
      - SELECT * FROM "TaskStatuses" WHERE bucket.app = 'mobile'
      - SELECT * FROM "TaskTypes" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Tasks" WHERE bucket.app = 'mobile'
      - SELECT * FROM "UserHomeBases" WHERE bucket.app = 'mobile'
      - SELECT * FROM "UserRoles" WHERE bucket.app = 'mobile'
      - SELECT * FROM "UserStatuses" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Users" WHERE bucket.app = 'mobile'
      - SELECT * FROM "Vehicles" WHERE bucket.app = 'mobile'
      - SELECT * FROM "WorkTrackers" WHERE bucket.app = 'mobile'
      - SELECT * FROM "WorkTrackerInspections" WHERE bucket.app = 'mobile'
      - SELECT * FROM "BlueBook" WHERE bucket.app = 'mobile'
